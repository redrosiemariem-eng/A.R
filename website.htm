<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyShop</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        /* Navbar */
        header {
            background: #333;
            color: white;
            display: flex;
            justify-content: space-between;
            padding: 15px 30px;
        }

        nav a {
            color: white;
            margin-left: 20px;
            text-decoration: none;
        }

        nav a:hover {
            text-decoration: underline;
        }

        /* Hero */
        .hero {
            background: url('https://via.placeholder.com/1200x400') no-repeat center/cover;
            color: white;
            text-align: center;
            padding: 100px 20px;
        }

        .hero button {
            padding: 10px 20px;
            border: none;
            background: orange;
            color: white;
            cursor: pointer;
        }

        /* Products */
        .products {
            padding: 40px;
            text-align: center;
        }

        .product-container {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .product {
            border: 1px solid #ddd;
            padding: 15px;
            width: 200px;
            border-radius: 8px;
        }

        .product img {
            width: 100%;
        }

        .product button {
            background: green;
            color: white;
            border: none;
            padding: 8px;
            cursor: pointer;
        }

        /* Footer */
        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <header>
        <h1>MyShop</h1>
        <nav>
            <a href="#">Home</a>
            <a href="#">Products</a>
            <a href="#">Cart</a>
            <a href="#">Contact</a>
        </nav>
    </header>

    <!-- Hero Section -->
    <section class="hero">
        <h2>Welcome to MyShop</h2>
        <p>Best products at affordable prices</p>
        <button>Shop Now</button>
    </section>

    <!-- Products -->
    <section class="products">
        <h2>Featured Products</h2>

        <div class="product-container">

            <div class="product">
                <img src="https://via.placeholder.com/150">
                <h3>Product 1</h3>
                <p>$20</p>
                <button>Add to Cart</button>
            </div>

            <div class="product">
                <img src="https://via.placeholder.com/150">
                <h3>Product 2</h3>
                <p>$35</p>
                <button>Add to Cart</button>
            </div>

            <div class="product">
                <img src="https://via.placeholder.com/150">
                <h3>Product 3</h3>
                <p>$50</p>
                <button>Add to Cart</button>
            </div>

        </div>
    </section>

    <!-- Footer -->
    <footer>
        <p>© 2026 MyShop | All Rights Reserved</p>
    </footer>

</body>
</html>
